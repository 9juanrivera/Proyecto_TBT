<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBT</title>

    <!-- la fuente quicksand  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

    <!-- La conexion con el css-->
    <link rel="stylesheet" href="css/style.css">
    <!-- la conexion con el css del modal -->
    <link rel="stylesheet" href="css/modal.css">

    <!-- Logo de la pagina-->
    <link rel="icon" href="img/logos/amar.png">
</head>

<body>

<header>
    <!-- el "logo" es un boton para refrescar no tocar-->
    <button onclick="location.reload()" class="button" data-text="TBT">
        <span class="actual-text">&nbsp;TBT&nbsp;</span>
        <span aria-hidden="true" class="hover-text">&nbsp;TBT&nbsp;</span>
    </button>

    <!-- Botón hamburguesa -->
    <aside class="menu-btn" onclick="toggleMenu()">☰</aside>

        <!-- Lista de musica -->
    <aside id="menu">
        <h3>Música</h3>

        <audio id="player" controls></audio>

        <ul>
            <li onclick="cambiarCancion('raw/Cosaspendientes.mp3')">Cosas Pendientes</li>
            <li onclick="cambiarCancion('raw/cositaslak.mp3')">Cositas</li>
            <li onclick="cambiarCancion('raw/olvidala.mp3')">Olvidala</li>
            <li onclick="cambiarCancion('raw/situmequisieras.mp3')">Sí Tú Me Quisieras</li>
            <li onclick="cambiarCancion('raw/Recuerdos.mp3')">Recuerdos</li>
            <li onclick="cambiarCancion('raw/hawai.mp3')">Hawai</li>
            <li onclick="cambiarCancion('raw/meparte.mp3')">Me parte el corazón</li>
        </ul>
    </aside>
</header>

<main class="contenedor">
    <!-- el class es para identificarlo y modficarlo a el contenedor solito y no todo el body -->
     <!-- cuando empiece con el js tengo que ponerle el id para identifar cada seccion -->

    <p class="Parrafo">...Los inolvidables...</p>

    <section class="cards">

        <article class="card">
         <!-- dentro del Img tenemos la apertura a los modal de cada uno para esto estoy utlizando los atributos data- que son para guardar la informacion de cada uno -->
            <img src="img/los_inolvidables/el_pretty.jpg" alt="Foto de Juan Restrepo" class="abrir"
                data-titulo="Las Afortunadas" 
                data-imagen="img/exs/flaca.jpg , img/exs/malditaperra.jpg"
                data-nombres="Maria jose pulgarin , Maria fernanda">
            <figcaption>Juan Restrepo</figcaption>
             
        </article>

        <article class="card">
            <img src="img/los_inolvidables/brandon.jpg" 
                alt="Foto de Brandon Sepúlveda"
                class="abrir"
                data-titulo="Las Desafortunadas" 
                data-carrusel="true">
            <figcaption>Brandon Sepúlveda</figcaption>
        </article>

        <article class="card">
            <img src="img/los_inolvidables/fede.jpg" 
                alt="Foto de Federico Henao" 
                class="abrir"
                data-titulo="Las Desafortunadas"
                data-imagen="img/exs/mariana.jpg"
                data-nombres="Mariana Suarez">
            <figcaption>Federico Henao</figcaption>
        </article>

        <article class="card">
            <img src="img/los_inolvidables/salo.jpg" 
                alt="Foto de Salo Hernández" 
                class="abrir"
                data-titulo="Los Desafortunados"
                data-imagen="img/exs/lucas.jpg , img/exs/chico1.jpg , img/exs/chico2.jpg , img/exs/chico3.jpg , img/exs/chico4.jpg , img/exs/chico5.jpg"
                data-nombres="Lucas 💚, Samuel , Santiago , Sebastian , Stiven , Julián">
            <figcaption>Salo Hernández</figcaption>
        </article>

        <article class="card">
            <img src="img/los_inolvidables/fofi.jpg" 
                alt="Foto de Sofi Ocampo" 
                class="abrir"
                data-titulo="Los Desafortunados"
                data-imagen="img/exs/diegoo.jpg"
                data-nombres="Diego Morales">
            <figcaption>Sofi Ocampo</figcaption>
        </article>

        <article class="card">
            <img src="img/los_inolvidables/lore.jpg" 
                alt="Foto de Lorena Jiménez" 
                class="abrir"
                data-titulo="Los Afortunados"
                data-imagen="img/exs/johan.jpg"
                data-nombres="Johan Alexis">
            <figcaption>Lorena Jiménez</figcaption>
        </article>

    </section>

    <div id="modal" class="modal">
        <div class="modal-contenido">
            <span class="cerrar">&times;</span>

            <h2 id="titulo"></h2>
            <p id="texto"></p>

            <!-- las figuritas -->
            <div id="galeria"></div>
        </div>
    </div>

</main>

<footer class="footer">

    <div>
        <h2>TBT</h2>
        <p>Desparche Productions</p>

        <h3>Sígueme</h3>
        <div>
            <a href="https://www.instagram.com/juanrestrepo423/" target="_blank">
                juanrestrepo423 📷
            </a>
        </div>
    </div>

</footer>
<script src="js/modal.js"></script>
</body>
</html>
